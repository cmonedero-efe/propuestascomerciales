<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Datos de la propuesta — EFE</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f5f5f3;
      color: #1a1a18;
      min-height: 100vh;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 2rem 1rem;
    }

    .card {
      background: #ffffff;
      border-radius: 14px;
      border: 0.5px solid rgba(0,0,0,0.12);
      padding: 2rem 2rem 1.5rem;
      width: 100%;
      max-width: 680px;
    }

    .header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 1.5rem;
      padding-bottom: 1rem;
      border-bottom: 0.5px solid rgba(0,0,0,0.1);
    }

    .header svg { color: #888; flex-shrink: 0; }

    h1 {
      font-size: 18px;
      font-weight: 500;
      color: #1a1a18;
    }

    .form-grid { display: grid; gap: 16px; }

    .row-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

    @media (max-width: 480px) { .row-2 { grid-template-columns: 1fr; } }

    label {
      display: block;
      font-size: 13px;
      color: #666;
      margin-bottom: 5px;
    }

    input[type="text"],
    textarea {
      width: 100%;
      padding: 8px 12px;
      font-size: 15px;
      font-family: inherit;
      color: #1a1a18;
      background: #fff;
      border: 0.5px solid rgba(0,0,0,0.2);
      border-radius: 8px;
      outline: none;
      transition: border-color 0.15s;
    }

    input[type="text"]:focus,
    textarea:focus { border-color: rgba(0,0,0,0.45); box-shadow: 0 0 0 3px rgba(0,0,0,0.06); }

    textarea { resize: vertical; line-height: 1.6; }

    .actions {
      display: flex;
      gap: 10px;
      margin-top: 1.5rem;
      padding-top: 1rem;
      border-top: 0.5px solid rgba(0,0,0,0.1);
    }

    button {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      padding: 9px 14px;
      font-size: 14px;
      font-family: inherit;
      font-weight: 500;
      color: #1a1a18;
      background: transparent;
      border: 0.5px solid rgba(0,0,0,0.2);
      border-radius: 8px;
      cursor: pointer;
      transition: background 0.12s;
    }

    button:hover { background: #f5f5f3; }
    button:active { transform: scale(0.98); }

    .preview-box {
      display: none;
      margin-top: 1rem;
      background: #f9f9f7;
      border: 0.5px solid rgba(0,0,0,0.1);
      border-radius: 12px;
      padding: 1rem 1.25rem;
    }

    .preview-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 10px;
    }

    .preview-header span { font-size: 13px; font-weight: 500; color: #888; }

    .preview-header button {
      flex: none;
      padding: 2px 10px;
      font-size: 12px;
      font-weight: 400;
    }

    pre {
      font-family: 'SF Mono', 'Fira Code', 'Fira Mono', monospace;
      font-size: 12px;
      white-space: pre-wrap;
      word-break: break-word;
      line-height: 1.7;
      color: #1a1a18;
    }

    .toast {
      display: none;
      margin-top: 10px;
      padding: 8px 14px;
      background: #eaf3de;
      color: #3b6d11;
      border-radius: 8px;
      font-size: 13px;
      text-align: center;
    }

    @media (prefers-color-scheme: dark) {
      body { background: #1a1a18; color: #e8e8e4; }
      .card { background: #242422; border-color: rgba(255,255,255,0.1); }
      h1 { color: #e8e8e4; }
      label { color: #aaa; }
      input[type="text"], textarea { background: #1a1a18; color: #e8e8e4; border-color: rgba(255,255,255,0.15); }
      input[type="text"]:focus, textarea:focus { border-color: rgba(255,255,255,0.4); box-shadow: 0 0 0 3px rgba(255,255,255,0.06); }
      button { color: #e8e8e4; border-color: rgba(255,255,255,0.15); }
      button:hover { background: rgba(255,255,255,0.06); }
      .preview-box { background: #1a1a18; border-color: rgba(255,255,255,0.1); }
      pre { color: #e8e8e4; }
      .header { border-color: rgba(255,255,255,0.1); }
      .actions { border-color: rgba(255,255,255,0.1); }
      .toast { background: #27500a; color: #c0dd97; }
    }
  </style>
</head>
<body>

<main class="card" role="main">

  <div class="header">
    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
      <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
      <polyline points="14 2 14 8 20 8"/>
      <line x1="16" y1="13" x2="8" y2="13"/>
      <line x1="16" y1="17" x2="8" y2="17"/>
      <polyline points="10 9 9 9 8 9"/>
    </svg>
    <h1>Datos de la propuesta</h1>
  </div>

  <div class="form-grid">

    <div>
      <label for="titulo">Título de la propuesta</label>
      <input id="titulo" type="text" placeholder="Ej. Campaña de contenidos Q3 2026">
    </div>

    <div class="row-2">
      <div>
        <label for="cliente">Cliente</label>
        <input id="cliente" type="text" placeholder="Nombre del cliente">
      </div>
      <div>
        <label for="contacto">Contacto</label>
        <input id="contacto" type="text" placeholder="Nombre y cargo">
      </div>
    </div>

    <div>
      <label for="comercial">Comercial EFE</label>
      <input id="comercial" type="text" placeholder="Nombre del comercial">
    </div>

    <div class="row-2">
      <div>
        <label for="email-comercial">Email comercial</label>
        <input id="email-comercial" type="text" placeholder="nombre@efe.com">
      </div>
      <div>
        <label for="telefono-comercial">Teléfono comercial</label>
        <input id="telefono-comercial" type="text" placeholder="+34 91 000 00 00">
      </div>
    </div>

    <div>
      <label for="briefing">Briefing</label>
      <textarea id="briefing" rows="4" placeholder="Describe el contexto, necesidad o encargo del cliente..."></textarea>
    </div>

    <div>
      <label for="productos">Productos / servicios + tarifas</label>
      <textarea id="productos" rows="4" placeholder="Lista los productos o servicios incluidos con sus precios..."></textarea>
    </div>

    <div>
      <label for="beneficios">Beneficios para el cliente</label>
      <textarea id="beneficios" rows="4" placeholder="¿Qué valor aporta esta propuesta al cliente?"></textarea>
    </div>

  </div>

  <div class="actions">
    <button onclick="previewJson()" aria-label="Vista previa del JSON">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
      Vista previa
    </button>
    <button onclick="downloadJson()" aria-label="Descargar JSON">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
      Descargar JSON
    </button>
    <button onclick="copyJson()" aria-label="Copiar JSON al portapapeles">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
      Copiar
    </button>
  </div>

  <div class="preview-box" id="preview-box">
    <div class="preview-header">
      <span>Vista previa JSON</span>
      <button onclick="document.getElementById('preview-box').style.display='none'">Cerrar</button>
    </div>
    <pre id="preview-content"></pre>
  </div>

  <div class="toast" id="toast">Copiado al portapapeles</div>

</main>

<script>
  function buildJson() {
    const now = new Date();
    return {
      fecha: now.toLocaleDateString('es-ES', { day: '2-digit', month: '2-digit', year: 'numeric' }),
      titulo: document.getElementById('titulo').value.trim(),
      cliente: document.getElementById('cliente').value.trim(),
      contacto: document.getElementById('contacto').value.trim(),
      comercial: document.getElementById('comercial').value.trim(),
      email_comercial: document.getElementById('email-comercial').value.trim(),
      telefono_comercial: document.getElementById('telefono-comercial').value.trim(),
      briefing: document.getElementById('briefing').value.trim(),
      productos: document.getElementById('productos').value.trim(),
      beneficios: document.getElementById('beneficios').value.trim()
    };
  }

  function previewJson() {
    document.getElementById('preview-content').textContent = JSON.stringify(buildJson(), null, 2);
    const box = document.getElementById('preview-box');
    box.style.display = 'block';
    box.scrollIntoView({ behavior: 'smooth', block: 'start' });
  }

  function downloadJson() {
    const data = buildJson();
    const slug = data.titulo.replace(/[^a-z0-9áéíóúñü ]/gi, '').replace(/\s+/g, '-').toLowerCase() || 'propuesta';
    const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json;charset=utf-8' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `propuesta-${slug}.json`;
    a.click();
    URL.revokeObjectURL(url);
  }

  function copyJson() {
    navigator.clipboard.writeText(JSON.stringify(buildJson(), null, 2)).then(() => {
      const t = document.getElementById('toast');
      t.style.display = 'block';
      setTimeout(() => { t.style.display = 'none'; }, 2000);
    });
  }
</script>

</body>
</html>
